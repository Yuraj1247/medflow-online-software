    <style>
      body {
        background-color: #0B0F1A;
        color: #E5E7EB;
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar for dark theme */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0B0F1A; 
      }
      ::-webkit-scrollbar-thumb {
        background: #1F2937; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #374151; 
      }

      /* PRINT STYLES */
      @media print {
        @page {
          size: A4;
          margin: 10mm;
        }
        
        body {
          background-color: white !important;
          color: black; /* Default to black, but allow overrides */
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        /* Hide everything globally */
        body * {
          visibility: hidden;
        }

        /* Reset the Modal Backdrop to ensure it doesn't constrain printing */
        .modal-backdrop {
          position: absolute !important;
          top: 0 !important;
          left: 0 !important;
          width: 100% !important;
          height: auto !important;
          margin: 0 !important;
          padding: 0 !important;
          background: none !important;
          overflow: visible !important;
          z-index: 9999;
          visibility: hidden; /* Keep container hidden, show content */
        }
        
        /* Reset the content wrapper (motion div) */
        .modal-backdrop > div {
          position: static !important;
          transform: none !important;
          width: 100% !important;
          height: auto !important;
          margin: 0 !important;
          padding: 0 !important;
          overflow: visible !important;
          box-shadow: none !important;
          border: none !important;
        }

        /* The Printable Area - Make it Visible */
        .printable-area {
          visibility: visible !important;
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          height: auto !important;
          background-color: white !important;
          /* Removed forced color: black !important to allow colored text */
          z-index: 10000;
          overflow: visible !important;
          display: block !important;
          padding: 0 !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        
        /* Ensure all children of printable area are visible and styled for print */
        .printable-area * {
          visibility: visible !important;
          /* Removed color override so Tailwind colors take effect */
          box-shadow: none !important;
          text-shadow: none !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        /* Hide specific UI elements within the printable area if marked */
        .no-print {
          display: none !important;
        }
      }
    </style>
